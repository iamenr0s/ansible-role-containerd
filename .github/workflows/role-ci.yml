---

name: role-ci
'on':
  pull_request:
  push:
    branches:
      - main

jobs:
  yamllint:
    runs-on: ubuntu-20.04
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          path: "${{ github.repository }}"
      - name: molecule
        uses: robertdebock/molecule-action@6.0.1
        with:
          command: yamllint
  test:
    needs:
      - yamllint
    runs-on: ubuntu-20.04
    strategy:
      matrix:
        image:
          - almalinux9
          - rockylinux9
          - fedora39
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          path: "${{ github.repository }}"
      - name: molecule
        uses: robertdebock/molecule-action@6.0.1
        with:
          image: "${{ matrix.image }}"
          options: parallel
          scenario: default